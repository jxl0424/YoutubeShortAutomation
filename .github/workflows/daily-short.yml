name: Daily Short

# Generates + publishes the once-a-day Short on GitHub's runners so it no longer
# depends on the laptop being awake. Mirrors what the local Windows task did
# (scripts/run_daily.ps1 -> `python -m shorts`). See the migration plan / handoff.

on:
  schedule:
    # UTC — GitHub cron does NOT observe DST. 08:00 UTC = 09:00 UK in summer (BST),
    # 08:00 UK in winter (GMT). Cron also fires 5-15 min late. Adjust if you want a
    # different local post time.
    - cron: "0 8 * * *"
  workflow_dispatch:
    inputs:
      privacy:
        description: "Manual-test upload privacy ('default' = config value, i.e. public)"
        type: choice
        default: default
        options: [default, private, unlisted, public]

permissions:
  contents: write # to commit the .state/ dedupe + rotation files back to main

concurrency:
  group: daily-short
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4 # also restores the committed .state/ from the last run

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Cache Kokoro model
        uses: actions/cache@v4
        with:
          path: models/kokoro
          key: kokoro-model-files-v1.0

      - name: Download Kokoro model (cache miss only)
        run: |
          mkdir -p models/kokoro
          base=https://github.com/thewh1teagle/kokoro-onnx/releases/download/model-files-v1.0
          [ -f models/kokoro/kokoro-v1.0.onnx ] || curl -fsSL "$base/kokoro-v1.0.onnx" -o models/kokoro/kokoro-v1.0.onnx
          [ -f models/kokoro/voices-v1.0.bin ] || curl -fsSL "$base/voices-v1.0.bin" -o models/kokoro/voices-v1.0.bin

      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e ".[youtube,kokoro,cloud]"

      - name: Materialize OAuth files
        env:
          CLIENT_SECRETS_JSON: ${{ secrets.YOUTUBE_CLIENT_SECRETS_JSON }}
          TOKEN_JSON: ${{ secrets.YOUTUBE_TOKEN_JSON }}
        run: |
          mkdir -p .secrets
          printf '%s' "$CLIENT_SECRETS_JSON" > .secrets/client_secrets.json
          printf '%s' "$TOKEN_JSON" > .secrets/youtube_token.json

      - name: Privacy override (manual test runs only; not committed)
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.privacy != 'default' }}
        run: |
          sed -i "s/^  privacy: .*/  privacy: ${{ inputs.privacy }}/" config/shorts.yaml

      - name: Generate + upload short
        env:
          NVIDIA_API_KEY: ${{ secrets.NVIDIA_API_KEY }}
          PEXELS_API_KEY: ${{ secrets.PEXELS_API_KEY }}
          YOUTUBE_CLIENT_SECRETS: .secrets/client_secrets.json
        run: python -m shorts --log-level INFO

      - name: Persist .state/ back to main
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git checkout -- config/shorts.yaml 2>/dev/null || true # drop any test-run privacy edit
          git add -f .state/ 2>/dev/null || true
          if git diff --cached --quiet; then
            echo "No state change to commit."
            exit 0
          fi
          git commit -m "chore(state): update dedupe/rotation [skip ci]"
          # A Re-run checks out the original trigger SHA (stale), and a normal run
          # can race another push; rebase our state commit onto the latest main
          # (newest run wins on the regenerated .state/ files) and retry.
          for attempt in 1 2 3; do
            git fetch origin main || true
            if git rebase -X theirs FETCH_HEAD && git push origin HEAD:main; then
              echo "Persisted .state/ on attempt $attempt."
              exit 0
            fi
            echo "Push attempt $attempt failed (remote advanced); retrying..."
            git rebase --abort 2>/dev/null || true
            sleep 3
          done
          echo "Could not persist .state/ after 3 attempts." >&2
          exit 1

      - name: Upload run logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: run-logs
          path: output/**/logs/**
          if-no-files-found: warn
