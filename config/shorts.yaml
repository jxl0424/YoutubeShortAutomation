# Stage 2 — Shorts generation configuration.
# Everything is configurable here; secrets are read from env vars named by the
# *_env keys (never stored in YAML). Defaults need no PAID keys, but the default
# voice (kokoro) requires a one-time free model download — see the voice section.

language: en

enrichment:
  enabled: true         # fetch recent headlines (Google News RSS, keyless) to
  max_facts: 5          # ground the script; skipped silently on any failure

script:
  provider: nvidia_nim
  fallback_providers: []
  model: meta/llama-3.1-70b-instruct
  temperature: 0.7
  max_tokens: 1024
  timeout_seconds: 120   # free-tier LLM endpoints can take >30s per script
  # The LLM picks the script length inside this band based on content depth
  # (biased short); at ~2.5 words/sec this spans roughly 15-65 seconds.
  min_words: 40
  max_words: 160
  include_cta: true
  api_key_env: NVIDIA_API_KEY

metadata:
  max_title_length: 100
  max_tags: 15
  hashtag_count: 5

voice:
  # Kokoro is local offline neural TTS (Apache-2.0). It needs a one-time setup:
  # `pip install -e ".[kokoro]"` plus the model files in models/kokoro/ (see
  # README). Set provider to edge_tts for a zero-setup online alternative.
  provider: kokoro
  voice: af_heart       # Kokoro flagship voice (use en-US-AriaNeural etc. with edge_tts)
  language: en
  rate: "+0%"
  kokoro_model_path: models/kokoro/kokoro-v1.0.onnx
  kokoro_voices_path: models/kokoro/voices-v1.0.bin

visual_planning:
  words_per_second: 2.5   # scene lengths are proportional to words (no clamps)
  default_visual_type: stock_video

assets:
  providers: [pexels, pollinations]
  stock:
    pexels_api_key_env: PEXELS_API_KEY
    pixabay_api_key_env: PIXABAY_API_KEY
  generated:
    provider: pollinations    # credential-free image generation
    model: flux               # higher-quality Pollinations model
    style: "cinematic, photorealistic, vivid color, dramatic lighting, vertical composition"
    api_key_env: null

validation:
  min_width: 720
  min_height: 1280
  allow_duplicates: false

video:
  width: 1080
  height: 1920
  fps: 30
  bitrate: 8M
  ken_burns: true
  transitions: true
  scene_text: true     # big per-scene keyword overlays (script's on_screen_text)
  template: default
  subtitles:
    enabled: true
    font: Arial
    font_size: 96        # output-video pixels (96 ≈ 5% of frame height)
    color: white         # common name or #RRGGBB
    position: bottom     # bottom | center | top
  music:
    enabled: true
    # CC0 lo-fi loop shipped with the repo (see assets/music/README.md).
    # Relative paths resolve against the project root.
    path: assets/music/lofi-bubbles.mp3
    volume: 0.15

thumbnail:
  enabled: true
  template: default
  title_overlay: true
  branding: null

packaging:
  output_dir: output

upload:
  enabled: true        # stage skips itself (with a warning) if no OAuth creds are set
  privacy: public      # QA-pass privacy — QA failures land at qa_fail_privacy
  qa_fail_privacy: private   # QA failures land here as a manual-review queue
  category_id: "22"
  # Self-declared status flags. A faceless channel of AI voice + AI/stock
  # imagery for real news discloses synthetic media (YouTube requires it for
  # realistic altered content) and is not child-directed. Age restriction is
  # NOT here: it is read-only in the Data API and only settable manually in
  # YouTube Studio — general-audience content needs none anyway.
  contains_synthetic_media: true
  made_for_kids: false
  client_secrets_env: YOUTUBE_CLIENT_SECRETS
  token_path: .secrets/youtube_token.json

archive:
  # Mirror each finished short to S3-compatible object storage (default:
  # Cloudflare R2 — 10 GB free, no egress fees). OFF until you create a bucket
  # and add R2_ENDPOINT_URL / R2_ACCESS_KEY_ID / R2_SECRET_ACCESS_KEY to .env
  # and set `bucket` below (see README). The stage skips itself (with a
  # warning) when disabled or uncredentialed, and never fails an otherwise
  # successful run. Raw assets/ footage is skipped (large + re-downloadable).
  enabled: false
  bucket: ""
  prefix: shorts
  include_assets: false
  endpoint_url_env: R2_ENDPOINT_URL
  access_key_id_env: R2_ACCESS_KEY_ID
  secret_access_key_env: R2_SECRET_ACCESS_KEY

retention:
  # Prune old local runs so output/ stops growing. OFF by default (destructive).
  # The newest `keep_runs` folders are kept intact; older runs lose only their
  # re-downloadable assets/ subfolder (~85% of the size) — the small deliverable
  # (video.mp4, thumbnail, metadata) stays local. Runs after each daily job.
  enabled: true
  keep_runs: 5

report:
  # Weekly channel-growth report (shorts-report / scripts/run_weekly_report.ps1).
  # Read-only scopes with a SEPARATE token from the upload one; the first run
  # opens a browser consent and needs the YouTube Analytics API enabled in the
  # same Google Cloud project as the OAuth client.
  output_dir: reports
  top_videos: 5
  client_secrets_env: YOUTUBE_CLIENT_SECRETS
  token_path: .secrets/youtube_report_token.json

http:
  timeout_seconds: 60   # image generation (Pollinations) can be slow
  max_retries: 3
  backoff_factor: 0.5
  backoff_max_seconds: 30
